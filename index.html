function defaultState(){
  return {
    version: 1,
    startedAt: today(),
    updatedAt: '',
    words: {},
    sessions: {},
    wrongQueue: [],
    settings: {
      dailyCorrectTarget: 20,
      newPreviewLimit: 12,
      maxReviewInterval: 365,
      intervals: [1,3,7,14,30,60,120,240,365],

function esc(s){s=String(s==null?'':s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escJs(s){s=String(s==null?'':s);return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}
function toast(msg){var el=document.getElementById('toast');el.innerHTML=esc(msg);el.style.display='block';setTimeout(function(){el.style.display='none';},2600);}
function today(){var d=new Date();var y=d.getFullYear();var m=('0'+(d.getMonth()+1)).slice(-2);var day=('0'+d.getDate()).slice(-2);return y+'-'+m+'-'+day;}
function addDays(dateStr, days){var p=dateStr.split('-');var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));d.setDate(d.getDate()+Number(days||0));var y=d.getFullYear();var m=('0'+(d.getMonth()+1)).slice(-2);var day=('0'+d.getDate()).slice(-2);return y+'-'+m+'-'+day;}
function weekdayJa(dateStr){var p=dateStr.split('-');var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));return ['日','月','火','水','木','金','土'][d.getDay()];}
function daysBetween(a,b){return Math.floor((new Date(b+'T00:00:00').getTime()-new Date(a+'T00:00:00').getTime())/86400000);}

function loadState(){
  try{var s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return defaultState();
}
function saveState(){
  try{state.updatedAt=new Date().toISOString();localStorage.setItem(STORAGE_KEY, JSON.stringify(state));}catch(e){toast('端末保存に失敗しました');}
}
function migrateState(){
  var d=defaultState();
  if(!state.words)state.words={};
  if(!state.sessions)state.sessions={};
  if(!state.wrongQueue)state.wrongQueue=[];
  if(!state.settings)state.settings={};
  for(var k in d.settings) if(state.settings[k]==null) state.settings[k]=d.settings[k];
}

function init(){
  state=loadState();
  migrateState();
  setupVoices();
  render();
}

function navHtml(){
  var tabs=[['home','ホーム'],['voice','声で答える'],['preview','新語確認'],['check','確認'],['list','単語'],['settings','設定']];
  var h='';
  for(var i=0;i<tabs.length;i++) h+='<button class="'+(view===tabs[i][0]?'active':'')+'" onclick="go(\''+tabs[i][0]+'\')">'+tabs[i][1]+'</button>';
  document.getElementById('nav').innerHTML=h;
  var f='';
  for(i=0;i<5;i++) f+='<button class="'+(view===tabs[i][0]?'active':'')+'" onclick="go(\''+tabs[i][0]+'\')">'+tabs[i][1]+'</button>';
  document.getElementById('foot').innerHTML=f;
}
function go(v){view=v; if(v!=='voice'){stopRecognition();} render();}
function render(){
  navHtml();
  var app=document.getElementById('app');
  if(view==='home') app.innerHTML=viewHome();
  if(view==='voice') app.innerHTML=viewVoice();
  if(view==='preview') app.innerHTML=viewPreview();
  if(view==='check') app.innerHTML=viewCheck();
  if(view==='list') app.innerHTML=viewList();
  if(view==='settings') app.innerHTML=viewSettings();
}

function getWord(id){for(var i=0;i<WORD_DATA.length;i++) if(WORD_DATA[i].id===id) return WORD_DATA[i];return null;}
function wordState(id){
  if(!state.words[id]) state.words[id]={status:'new',stage:0,correct:0,wrong:0,seen:0,due:'',last:'',introduced:'',consecutive:0,oral:0,oralLast:'',typeCorrect:{voice:0},typeWrong:{voice:0}};
  if(!state.words[id].typeCorrect) state.words[id].typeCorrect={voice:0};
  if(!state.words[id].typeWrong) state.words[id].typeWrong={voice:0};
  return state.words[id];
}
function todaySession(){
  var t=today();
  if(!state.sessions[t]) state.sessions[t]={date:t,preview:0,quizCorrect:0,quizWrong:0,attempts:0,oral:0,status:'new',lastAt:''};
  return state.sessions[t];
}
function markDay(){var s=todaySession();s.lastAt=new Date().toISOString();}

function intervalForStage(stage){var arr=state.settings.intervals||[1,3,7,14,30,60,120,240,365];var idx=Math.max(0,Math.min(arr.length-1,Number(stage||0)));return Math.min(Number(arr[idx]||1),Number(state.settings.maxReviewInterval||365));}
function afterCorrect(ws){var st=Math.min(8,Number(ws.stage||0)+1);return {stage:st,due:addDays(today(),intervalForStage(st)),status:st>=7?'long_review':'review'};}
function afterWrong(ws){var st=Math.max(0,Number(ws.stage||0)-2);return {stage:st,due:addDays(today(),1),status:'learning'};}
function duePriority(a,b){var wa=wordState(a.id), wb=wordState(b.id);if((wa.due||'9999')<(wb.due||'9999'))return -1;if((wa.due||'9999')>(wb.due||'9999'))return 1;if(Number(wb.wrong||0)!==Number(wa.wrong||0))return Number(wb.wrong||0)-Number(wa.wrong||0);return Number(wa.stage||0)-Number(wb.stage||0);}

function calcStats(){
  var t=today(),total=WORD_DATA.length,introduced=0,due=0,weak=0,newCount=0;
  for(var i=0;i<WORD_DATA.length;i++){var ws=state.words[WORD_DATA[i].id];if(!ws||!ws.introduced){newCount++;continue;}introduced++;if(ws.due&&ws.due<=t)due++;if(Number(ws.wrong||0)>=2||state.wrongQueue.indexOf(WORD_DATA[i].id)>=0)weak++;}
  return {total:total,introduced:introduced,due:due,weak:weak,newCount:newCount,percent:Math.round(introduced/total*100),streak:calcStreak()};
}
function calcStreak(){var count=0,d=today();while(true){var s=state.sessions[d];if(s&&(s.quizCorrect>0||s.preview>0||s.oral>0)){count++;d=addDays(d,-1);}else break;}return count;}

function viewHome(){
  var s=todaySession(), st=calcStats(), target=Number(state.settings.dailyCorrectTarget||20);
  var pct=Math.min(100,Math.round(s.quizCorrect/target*100));
  return '<div class="grid">'+
    '<div class="card wide"><span class="badge">音声回答専用</span><div class="big">'+s.quizCorrect+'/'+target+'問正解</div><div class="progress"><div class="bar" style="width:'+pct+'%"></div></div><p class="muted">4択は使いません。英単語を見て、日本語訳を声で答えます。アプリが音声認識して○×判定し、忘却曲線に反映します。</p><div class="row"><button class="good" onclick="go(\'voice\')">声で20問チャレンジ</button><button class="secondary" onclick="go(\'preview\')">新語確認</button><button class="ghost" onclick="go(\'check\')">毎日チェック</button></div></div>'+
    '<div class="card"><h2>進捗</h2><div class="row"><div class="statbox"><span class="small muted">登録語</span><strong>'+st.total+'</strong></div><div class="statbox"><span class="small muted">導入済み</span><strong>'+st.introduced+'</strong></div></div></div>'+
    '<div class="card"><h2>復習</h2><div class="row"><div class="statbox"><span class="small muted">今日の復習</span><strong>'+st.due+'</strong></div><div class="statbox"><span class="small muted">苦手語</span><strong>'+st.weak+'</strong></div></div></div>'+

    '</div>';
}

function pickPreviewWords(){
  var lim=Number(state.settings.newPreviewLimit||12),out=[];
  for(var i=0;i<WORD_DATA.length&&out.length<lim;i++){var ws=state.words[WORD_DATA[i].id];if(!ws||!ws.introduced)out.push(WORD_DATA[i]);}
  return out;
}
function viewPreview(){
  var words=pickPreviewWords();
  if(words.length===0)return '<div class="card"><h2>新語はすべて導入済みです</h2><button onclick="go(\'voice\')">声で答えるへ</button></div>';
  var h='<div class="card"><span class="badge">新語確認</span><h2>今日の新語</h2><p class="muted">まず意味を確認します。確認後、音声回答の対象に入ります。</p></div>';
  for(var i=0;i<words.length;i++){var w=words[i];h+='<div class="card"><div class="row" style="justify-content:space-between"><span class="badge">No.'+w.no+'</span><span class="small muted">'+esc(w.topic||'')+'</span></div><div class="word">'+esc(w.word)+'</div><div class="meaning">'+esc(w.meaning)+'</div><div class="row"><button class="ghost" onclick="speakEnglish(\''+escJs(w.word)+'\')">英語発音</button><button class="good" onclick="markPreview(\''+w.id+'\',true)">確認した</button><button class="danger" onclick="markPreview(\''+w.id+'\',false)">不安</button></div></div>';}
  return h;
}
function markPreview(id,remembered){
  var ws=wordState(id),s=todaySession();
  if(!ws.introduced)ws.introduced=today();
  ws.seen++;ws.last=today();
  if(remembered){ws.status='introduced';ws.stage=Math.max(ws.stage||0,0);ws.due=today();}
  else{ws.status='learning';ws.stage=0;ws.due=today();ws.wrong++;if(state.wrongQueue.indexOf(id)<0)state.wrongQueue.push(id);}
  s.preview++;markDay();saveState();render();
}

function chooseVoiceQuestion(){
  var t=today(), target=null;
  while(state.wrongQueue.length>0&&!target) target=getWord(state.wrongQueue.shift());
  if(!target){
    var due=[],learning=[],fresh=[],review=[];
    for(var i=0;i<WORD_DATA.length;i++){var w=WORD_DATA[i],ws=wordState(w.id);if(ws.introduced&&ws.due&&ws.due<=t)due.push(w);else if(ws.status==='learning')learning.push(w);else if(!ws.introduced)fresh.push(w);else review.push(w);}
    due.sort(duePriority);learning.sort(duePriority);review.sort(duePriority);
    target=due[0]||learning[0]||fresh[0]||review[0]||WORD_DATA[0];
  }
  return {wordId:target.id,type:'spoken_meaning',prompt:target.word,correct:target.meaning,startedAt:new Date().getTime()};
}

  var s=todaySession(),target=Number(state.settings.dailyCorrectTarget||20);

  if(!currentQuestion||answered||currentQuestion.type!=='spoken_meaning'){currentQuestion=chooseVoiceQuestion();answered=false;lastTranscript='';}
  var q=currentQuestion,w=getWord(q.wordId),pct=Math.min(100,Math.round(s.quizCorrect/target*100)),support=supportsSpeechRecognition();

  var maxPage=Math.max(0,Math.ceil(filtered.length/perPage)-1);if(listPage>maxPage)listPage=maxPage;if(listPage<0)listPage=0;var start=listPage*perPage,end=Math.min(filtered.length,start+perPage);
  var h='<div class="card"><h2>単語一覧</h2><p class="muted">2300語を100語ずつ表示します。</p><input id="wordSearch" value="'+esc(listQuery)+'" placeholder="単語・意味・番号で検索" oninput="setListQuery(this.value)"><div class="row" style="margin-top:12px"><button class="ghost" onclick="prevListPage()">前へ</button><span class="badge">'+(listPage+1)+' / '+(maxPage+1)+'ページ</span><button class="ghost" onclick="nextListPage()">次へ</button><span class="small muted">'+filtered.length+'件中 '+(filtered.length?start+1:0)+'〜'+end+'件</span></div></div><div class="card"><div class="stack">';
  for(i=start;i<end;i++){var ww=filtered[i],ws=wordState(ww.id);h+='<div style="border-bottom:1px solid #edf2f7;padding:8px 0"><b>'+ww.no+'. '+esc(ww.word)+'</b><br><span class="muted">'+esc(ww.meaning)+'</span><br><span class="small">状態:'+esc(ws.status||'new')+' / 正解:'+Number(ws.correct||0)+' / 不正解:'+Number(ws.wrong||0)+' / 次回:'+esc(ws.due||'-')+'</span></div>';}
  h+='</div></div>';return h;
}
function setListQuery(v){listQuery=v||'';listPage=0;render();var el=document.getElementById('wordSearch');if(el){el.focus();try{el.setSelectionRange(el.value.length,el.value.length);}catch(e){}}}
function nextListPage(){listPage++;render();}
function prevListPage(){listPage--;render();}

function setupVoices(){if(!window.speechSynthesis)return;refreshVoices();try{window.speechSynthesis.onvoiceschanged=function(){refreshVoices();if(view==='settings')render();};}catch(e){}}
function refreshVoices(){try{availableVoices=window.speechSynthesis.getVoices()||[];}catch(e){availableVoices=[];}}
function isEnglishVoice(v){return String(v&&v.lang||'').toLowerCase().indexOf('en')===0;}
function chooseEnglishVoice(){refreshVoices();var selected=String(state.settings.englishVoiceName||''),english=[];for(var i=0;i<availableVoices.length;i++)if(isEnglishVoice(availableVoices[i]))english.push(availableVoices[i]);if(!english.length)return null;if(selected)for(i=0;i<english.length;i++)if(english[i].name===selected)return english[i];var pref=['Samantha','Ava','Alex','Daniel','Google US English','Google UK English','Microsoft Aria','Microsoft Jenny'];for(var p=0;p<pref.length;p++)for(i=0;i<english.length;i++)if(String(english[i].name).indexOf(pref[p])>=0)return english[i];return english[0];}
function speakEnglish(txt){try{if(!window.speechSynthesis){toast('読み上げが使えません');return;}window.speechSynthesis.cancel();var v=chooseEnglishVoice();if(!v){toast('英語音声が端末にありません');return;}var u=new SpeechSynthesisUtterance(txt);u.voice=v;u.lang=v.lang||'en-US';u.rate=Number(state.settings.speechRate||0.78);u.pitch=1;window.speechSynthesis.speak(u);}catch(e){toast('音声再生に失敗しました');}}
function voiceSelectHtml(){refreshVoices();var english=[];for(var i=0;i<availableVoices.length;i++)if(isEnglishVoice(availableVoices[i]))english.push(availableVoices[i]);var selected=String(state.settings.englishVoiceName||''),h='<label style="display:block;margin-top:12px">英語音声</label><select id="englishVoiceName"><option value="">自動選択</option>';for(i=0;i<english.length;i++){var name=english[i].name,label=english[i].name+' / '+english[i].lang;h+='<option value="'+esc(name)+'" '+(selected===name?'selected':'')+'>'+esc(label)+'</option>';}h+='</select>';if(!english.length)h+='<div class="warnnotice" style="margin-top:10px">英語音声が見つかりません。iPad設定から英語音声を追加してください。</div>';return h;}
function testEnglishVoice(){speakEnglish('agree, oppose, advise, suggest, evidence, environment');}

function viewSettings(){
  return '<div class="card"><h2>設定</h2><label>1日の正解目標</label><input id="dailyTarget" type="number" min="5" max="100" value="'+esc(state.settings.dailyCorrectTarget)+'"><label style="display:block;margin-top:12px">新語確認数</label><input id="previewLimit" type="number" min="3" max="30" value="'+esc(state.settings.newPreviewLimit)+'"><label style="display:block;margin-top:12px">判定の厳しさ</label><select id="strictness"><option value="normal" '+(state.settings.autoJudgeStrictness==='normal'?'selected':'')+'>標準</option><option value="strict" '+(state.settings.autoJudgeStrictness==='strict'?'selected':'')+'>厳しめ</option><option value="loose" '+(state.settings.autoJudgeStrictness==='loose'?'selected':'')+'>ゆるめ</option></select>'+voiceSelectHtml()+'<label style="display:block;margin-top:12px">英語音声スピード</label><input id="speechRate" type="number" min="0.55" max="1.05" step="0.05" value="'+esc(state.settings.speechRate||0.78)+'"><label style="display:block;margin-top:12px"><input id="autoNext" type="checkbox" style="width:auto" '+(state.settings.autoNext?'checked':'')+'> 正誤判定後に自動で次へ</label><div class="row" style="margin-top:12px"><button onclick="saveSettings()">保存</button><button class="secondary" onclick="testEnglishVoice()">英語音声テスト</button></div><div class="oknotice" style="margin-top:14px">現在の学習進捗をそのまま引き継ぎます。進捗リセット機能は無効化されています。</div><div class="notice" style="margin-top:10px">進捗はこのiPad/ブラウザ内に保存されます。別端末とは同期しません。</div></div>';
}
function saveSettings(){state.settings.dailyCorrectTarget=Math.max(5,Math.min(100,Number(document.getElementById('dailyTarget').value)||20));state.settings.newPreviewLimit=Math.max(3,Math.min(30,Number(document.getElementById('previewLimit').value)||12));var st=document.getElementById('strictness');if(st)state.settings.autoJudgeStrictness=st.value||'normal';var voice=document.getElementById('englishVoiceName');if(voice)state.settings.englishVoiceName=voice.value||'';state.settings.speechRate=Math.max(0.55,Math.min(1.05,Number(document.getElementById('speechRate').value)||0.78));var an=document.getElementById('autoNext');state.settings.autoNext=!!(an&&an.checked);saveState();toast('保存しました');render();}
function resetAll(){toast('進捗保護のため、リセットは禁止されています');}

window.onload=init;
</script>
</body>
